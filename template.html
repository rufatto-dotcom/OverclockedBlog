<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} — OverClocked</title>

    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../post.css">
</head>
<body>

    <header>
        <span class="logo">OverClocked</span>

        <nav>
            <a href="../index.html">posts</a>
            <a href="../about.html">sobre</a>
            <a href="https://github.com/rufatto-dotcom">github</a>
            <input type="text" placeholder="buscar">
        </nav>
    </header>

    <main class="post">

        <div class="post-header">
            <span class="post-tag">{{tag}}</span>
            <span class="post-date">{{date}}</span>
            <h1>{{title}}</h1>
        </div>

        <article>
{{content}}
        </article>

        <nav class="post-nav">
            <a href="{{prev_link}}" class="post-nav-prev">
                ← {{prev_title}}
            </a>

            <a href="{{next_link}}" class="post-nav-next">
                {{next_title}} →
            </a>
        </nav>

    </main>

    <footer>
        <p>&copy; 2026 Gustavo Rufatto Gomes</p>

        <div class="footer-links">
            <a href="https://www.linkedin.com/in/gustavo-rufatto-095921340/">linkedin</a>
            <a href="https://www.instagram.com/rufattostein/">instagram</a>
        </div>
    </footer>

</body>
</html>
